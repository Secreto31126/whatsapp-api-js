# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://help.github.com/actions/language-and-framework-guides/publishing-nodejs-packages

name: Deploy to NPM

on:
    release:
        types: [created]

jobs:
    build:
        name: Build and Document
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
              with:
                  version: 10
                  cache: true
                  run_install: true
            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: pnpm

            - name: Build
              run: pnpm build

            - name: Store builds
              uses: actions/upload-artifact@v7
              with:
                  name: build
                  path: lib

    test:
        name: Test
        needs: build

        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [20.x, 22.x, 24.x]

        steps:
            - uses: actions/checkout@v6
            - uses: actions/download-artifact@v8
              with:
                  name: build
                  path: lib
            - uses: pnpm/action-setup@v5
              with:
                  version: 10
                  cache: true
                  run_install: true
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm

            - name: Test
              run: pnpm test

    publish-npm:
        name: Public Release
        needs: test

        runs-on: ubuntu-latest
        permissions:
            id-token: write

        if: ${{ !github.event.release.prerelease }}

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
              with:
                  version: 10
                  cache: true
            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  registry-url: https://registry.npmjs.org/
            - uses: actions/download-artifact@v8
              with:
                  name: build
                  path: lib

            - name: Give me 1 minute to reconsider my life actions
              run: sleep 60s

            - name: Ok, now publish it
              run: pnpm publish --provenance

    preview-npm:
        name: Beta Release
        needs: test

        runs-on: ubuntu-latest
        permissions:
            id-token: write

        if: ${{ github.event.release.prerelease }}

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
              with:
                  version: 10
                  cache: true
            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  registry-url: https://registry.npmjs.org/
            - uses: actions/download-artifact@v8
              with:
                  name: build
                  path: lib

            - name: Set package version to prerelease tag
              run: pnpm version --no-git-tag-version ${GITHUB_REF/refs\/tags\//}

            - name: Beta Release
              run: pnpm publish --provenance --tag beta --no-git-checks

    web-release:
        name: Deploy website
        needs: publish-npm

        uses: ./.github/workflows/web-release.yml
        secrets: inherit
        with:
            tag_name: ${{ github.event.release.tag_name }}
